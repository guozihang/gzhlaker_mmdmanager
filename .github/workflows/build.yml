name: Build Electron App

on:
  push:
    branches: [main]
    paths:
      - 'mmdmanager/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'mmdmanager/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: mmdmanager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build and publish (push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build -- --publish always

      - name: Build only (PR)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: npm run build

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: MMDManager-macOS
          path: |
            mmdmanager/dist/*.dmg
            mmdmanager/dist/*.zip

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: MMDManager-Windows
          path: |
            mmdmanager/dist/*.exe
