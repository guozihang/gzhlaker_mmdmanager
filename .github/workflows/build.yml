name: Build Electron App

on:
  push:
    branches: [main]
    paths:
      - 'mmdmanager/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - 'mmdmanager/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        working-directory: mmdmanager

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get version
        id: ver
        shell: bash
        run: echo "v=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build -- --publish never

      - name: Publish Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.ver.outputs.v }}-${{ matrix.platform }}
          name: MMDManager v${{ steps.ver.outputs.v }} (${{ matrix.platform }})
          files: mmdmanager/dist/*
          draft: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: MMDManager-${{ matrix.platform }}
          path: mmdmanager/dist/*
