<!DOCTYPE html>
<html>
<head>
    <title>MMDManager</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data:;">
    <link rel="stylesheet" type="text/css" href="css/animate.css">
    <link rel="stylesheet" type="text/css" href="css/bootstrap.css">
    <link rel="stylesheet" type="text/css" href="css/element.css">
    <link rel="stylesheet" type="text/css" href="css/main.css">
</head>
<body data-spy="scroll" data-target="#bar" data-offset="1">
    <!-- 主体 -->
    <div id="app" class="el-container is-vertical">
        <header class="el-header">
        </header>
        <main class="el-main">
            <el-row :gutter="20">
                <el-col :span="20" :offset="2">
                    <transition id="aniset" mode="out-in" enter-active-class="animated fadeIn" leave-active-class="animated fadeOut">       
                        <router-view class="container-fluid">
                            
                        </router-view>
                    </transition>
                </el-col>
            </el-row>
        </main>
        <div class="modal fade" id="myModal">
            <div class="modal-dialog modal-lg">
              <div class="modal-content">
                <!-- 模态框头部 -->
                <div class="modal-header">
                  <h4 class="modal-title">预览</h4>
                  <button type="button" class="close" data-dismiss="modal">&times;</button>
                </div>
           
                <!-- 模态框主体 -->
                <div class="modal-body" >
                    <div id="modelTarget">
    
                    </div>
                </div>
           
                <!-- 模态框底部 -->
                <div class="modal-footer">
                  <button type="button" class="btn btn-secondary" data-dismiss="modal">关闭</button>
                </div>
           
              </div>
            </div>
        </div>
        <button id="modelButton" type="button" class="btn btn-primary" data-toggle="modal" data-target="#myModal" style="display: none;">打开模态框</button>
        <!-- Import progress overlay -->
        <div v-if="importProgress.visible" class="import-progress-card" style="position:fixed;top:12px;right:12px;z-index:9999;
            background:#fff;border-radius:10px;padding:18px;width:340px;
            box-shadow:0 4px 20px rgba(0,0,0,.12)">
            <div style="font-weight:bold;margin-bottom:10px;font-size:14px">导入进度</div>
            <el-progress :percentage="importProgress.pct" :stroke-width="8"
                :color="importProgress.pct===100 ? '#67c23a' : '#409eff'"></el-progress>
            <div style="margin-top:10px;font-size:13px;color:#303133">{{importProgress.text}}</div>
            <div style="margin-top:4px;font-size:12px;color:#909399">{{importProgress.detail}}</div>
            <div style="font-size:12px;color:#c0c4cc;margin-top:2px">{{importProgress.done}}/{{importProgress.total}}</div>
        </div>
    </div>

            <div class="el-main">初始化中</div>

                                        <span>{{scope.row.address}}</span>
                                        <el-button circle size="mini" @click="copy(scope.row.address)" slot="reference">复</el-button>
                                    </div>
                                    <el-button type="text" @click="open(scope.row.address)" slot="reference">{{scope.row.id}}</el-button>
                                </el-popover>
                            </div>
                        </el-table-column>

                                                </tr>

                                            <tbody>
                                                <template v-for="(item, index) in scope.row.info.authority">

                        </el-form-item>

                        </el-form-item>

                            <el-radio-group v-model="settings.preview.buttonMode" @change="applyPreview">
                                <el-radio label="hover">悬浮预览（显示"模"字，鼠标悬浮出图）</el-radio>
                                <el-radio label="thumbnail">缩略图（用预览图替代"模"字）</el-radio>
                            </el-radio-group>
                        </el-form-item>
                        <el-form-item label="每页显示数量">
                            <el-input-number v-model="settings.preview.pageSize" :min="5" :max="100" :step="5"></el-input-number>

                        </el-form-item>

                            <el-button type="primary" @click="saveSettings">保存配置</el-button>
                            <el-button @click="resetSettings">恢复默认</el-button>
                        </el-form-item>
                    </el-form>
                </el-tab-pane>
                <el-tab-pane label="说明">
                    <div style="padding:20px;max-width:800px;line-height:1.8;font-size:14px;color:#303133;">
                        <h2 style="margin-bottom:16px;">MMDManager 使用说明</h2>

                        <h3>一、软件简介</h3>
                        <p>MMDManager 是一款 MikuMikuDance（MMD）模型/场景/动作/特效资源管理工具。支持拖拽导入、3D 预览、一键导出到 MMD 软件。</p>

                        <h3>二、导入资源</h3>
                        <p>将文件夹或文件<b>直接拖入软件窗口</b>即可导入，支持同时拖入多个文件夹：</p>
                        <ul>
                            <li><b>人物模型</b>：拖入包含 <code>.pmx</code> / <code>.pmd</code> 文件的文件夹</li>
                            <li><b>场景模型</b>：拖入时选择「场景」</li>
                            <li><b>VMD 动作</b>：拖入包含 <code>.vmd</code> 文件的文件夹</li>
                            <li><b>MME 特效</b>：拖入包含 <code>.fx</code> / <code>.x</code> 文件的文件夹</li>
                        </ul>
                        <p>导入后右上角显示进度条，自动生成模型预览图。<b>注意</b>：导入文件夹才能保留贴图，单独拖入模型文件不会复制贴图。</p>
                        <p><b>批量导入</b>：拖入多个文件夹时，弹出列表对话框，可逐个设置导入为模型或场景。</p>

                        <h3>三、加载模型</h3>
                        <p>在「人物模型」或「场景模型」标签中，<b>左键点击「模」按钮或缩略图</b>即可在 3D 预览区加载模型。</p>
                        <ul>
                            <li><b>鼠标左键拖动</b>：旋转视角</li>
                            <li><b>鼠标滚轮</b>：缩放</li>
                            <li><b>鼠标右键拖动</b>：平移</li>
                        </ul>
                        <p>模型加载后会自动生成预览截图，鼠标悬浮「模」按钮可查看大图。若开启了「场景人物共存」，可以同时加载一个场景和一个角色模型。</p>

                        <h3>四、播放动作（VMD）</h3>
                        <p>在「VMD」标签中，<b>左键点击「动」按钮</b>即可播放动作：</p>
                        <ul>
                            <li>若<b>已加载模型</b>：动作直接应用到当前模型</li>
                            <li>若<b>未加载模型</b>：自动加载「设置」中的默认模型，再应用动作</li>
                        </ul>

                        <h3>五、导出到 MMD 软件</h3>
                        <ul>
                            <li><b>右键「模」/ 缩略图</b>：将模型发送到 MMD 软件中打开</li>
                            <li><b>右键「动」</b>：将当前模型 + VMD 动作一起发送到 MMD</li>
                        </ul>
                        <p>需先在设置中配置 MMD 软件路径。使用 Windows Shell 机制，贴图正常加载，同一时间只打开一个 MMD 实例。</p>

                        <h3>六、菜单栏</h3>
                        <ul>
                            <li><b>Models / Scene / VMD / MME 文件夹</b>：在资源管理器中打开对应目录</li>
                            <li><b>软件列表</b>：将 <code>.exe</code> 放入 <code>software/</code> 子文件夹，菜单栏自动识别</li>
                            <li><b>快捷键</b>：Ctrl+Shift+1 模型管理 / Ctrl+Shift+2 工程页面</li>
                        </ul>

                        <h3>七、设置说明</h3>
                        <ul>
                            <li><b>数据存储目录</b>：所有资源的存放位置</li>
                            <li><b>默认模型路径</b>：点击 VMD 时自动加载的默认模型</li>
                            <li><b>MMD 软件路径</b>：右键导出使用的 MMD 可执行文件</li>
                            <li><b>环境光 / 方向光颜色</b>：3D 预览区光照颜色</li>
                            <li><b>显示坐标轴</b>：预览区是否显示坐标轴</li>
                            <li><b>摄像机自动旋转</b>：加载模型后摄像机是否自动环绕</li>
                            <li><b>相机 FOV</b>：视野角度（20-120°）</li>
                            <li><b>场景人物共存</b>：加载场景时不替换已加载的人物模型</li>
                            <li><b>模型按钮样式</b>：悬浮预览（鼠标悬停出图）/ 缩略图（预览图替代"模"字）</li>
                            <li><b>每页显示数量</b>：表格分页，每页显示条数</li>
                            <li><b>开发者工具</b>：打开/关闭 DevTools 控制台</li>
                        </ul>
                        <p>修改后点击「保存配置」生效。</p>

                        <h3>八、收藏与工程</h3>
                        <p>「收藏」标签可标记常用模型。「Project」页面管理工程文件。</p>
                    </div>
                </el-tab-pane>
            </el-tabs>
        </div>
    </template>

                                    </div>

                                </el-popover>
                            </div>
                        </el-table-column>
                        <el-table-column sortable prop="name" label="姓名" width="360">

                                            <img :src="scope.row.address + 'image.png'">
                                        </div>
                                        <el-button circle size="mini"  slot="reference">图</el-button>
                                    </el-popover>

                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <el-button circle slot="reference" size="mini">说</el-button>
                                </el-popover>
                            </div>
                        </el-table-column>
                        <el-table-column :formatter="format">
                            <div slot-scope="scope">
                                <div v-if="scope.row.type == 'yes'">
                                    <el-tag v-for="item in scope.row.info.tags" :key="item">
                                        <el-button type="text" size="mini">{{item}}</el-button>
                                    </el-tag>
                                </div>
                                <div v-else-if="scope.row.type == 'no'">
                                </div>
                            </div>
                        </el-table-column >
                    </el-table>
                </el-tab-pane>
            </el-tabs>
        </div>
    </template>
