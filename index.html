                        <h2 style="margin-bottom:16px;">MMDManager 使用说明</h2>

                        <h3>一、软件简介</h3>
                        <p>MMDManager 是一款 MikuMikuDance（MMD）模型/场景/动作/特效资源管理工具。支持拖拽导入、3D 预览、一键导出到 MMD 软件。</p>

                        <h3>二、导入资源</h3>
                        <p>将文件夹或文件<b>直接拖入软件窗口</b>即可导入：</p>
                        <ul>
                            <li><b>人物模型</b>：拖入包含 <code>.pmx</code> / <code>.pmd</code> 文件的文件夹</li>
                            <li><b>场景模型</b>：拖入时选择「场景」</li>
                            <li><b>VMD 动作</b>：拖入包含 <code>.vmd</code> 文件的文件夹</li>
                            <li><b>MME 特效</b>：拖入包含 <code>.fx</code> / <code>.x</code> 文件的文件夹</li>
                        </ul>
                        <p>导入后资源会自动分类到对应标签页中。<b>注意</b>：导入文件夹才能保留贴图，单独拖入模型文件不会复制贴图。</p>

                        <h3>三、加载模型</h3>
                        <p>在「人物模型」或「场景模型」标签中，<b>左键点击「模」按钮</b>即可在右侧 3D 预览区加载模型。</p>
                        <ul>
                            <li><b>鼠标左键拖动</b>：旋转视角</li>
                            <li><b>鼠标滚轮</b>：缩放</li>
                            <li><b>鼠标右键拖动</b>：平移</li>
                        </ul>
                        <p>若开启了「场景人物共存」，可以同时加载一个场景和一个角色模型。</p>

                        <h3>四、播放动作（VMD）</h3>
                        <p>在「VMD」标签中，<b>左键点击「动」按钮</b>即可播放动作：</p>
                        <ul>
                            <li>若<b>已加载模型</b>：动作直接应用到当前模型</li>
                            <li>若<b>未加载模型</b>：自动加载「设置」中的默认模型，再应用动作</li>
                        </ul>

                        <h3>五、导出到 MMD 软件</h3>
                        <ul>
                            <li><b>右键「模」</b>：将模型发送到 MMD 软件中打开（需先在设置中配置 MMD 路径）</li>
                            <li><b>右键「动」</b>：将当前模型 + VMD 动作一起发送到 MMD</li>
                        </ul>
                        <p>右键导出使用与拖入相同的 Windows Shell 机制，贴图可正常加载。同一时间只会打开一个 MMD 实例。</p>

                        <h3>六、菜单栏</h3>
                        <ul>
                            <li><b>Models / Scene / VMD / MME 文件夹</b>：在资源管理器中打开对应目录</li>
                            <li><b>软件列表</b>：将 <code>.exe</code> 程序放入 <code>software/</code> 目录的子文件夹中，菜单栏会自动识别</li>
                        </ul>

                        <h3>七、设置</h3>
                        <ul>
                            <li><b>数据存储目录</b>：所有模型、场景、VMD 等资源的存放位置</li>
                            <li><b>默认模型路径</b>：点击 VMD 时无已加载模型时自动使用的模型</li>
                            <li><b>MMD 软件路径</b>：右键导出功能使用的 MMD 可执行文件路径</li>
                            <li><b>预览设置</b>：环境光、方向光颜色、坐标轴、自动旋转、FOV、场景人物共存</li>
                        </ul>
                        <p>修改设置后点击「保存配置」生效。</p>

                        <h3>八、收藏与项目管理</h3>
                        <p>在「收藏」标签中可以标记重要的模型，方便快速查找。工程文件在「Project」页面管理。</p>

                        <h3>九、快捷键</h3>
                        <ul>
                            <li><b>Ctrl+Shift+1</b>：切换到模型管理页面</li>
                            <li><b>Ctrl+Shift+2</b>：切换到工程页面</li>
                        </ul>
                    </div>
                </el-tab-pane>
            </el-tabs>
        </div>
    </template>

    <template id="tSetting">
        <div class="el-container">
            <div class="el-main">设置中</div>
        </div>
    </template>

    <template id="tProject">
        <div>
            <el-tabs type="border-card">
                <el-tab-pane label="工程文件">
                    <el-input v-model="search" placeholder="查找...">
                        <template slot="append">工程数量：{{getProjectNum()}}</template>
                    </el-input>
                    <el-table :data="project" stripe style="width: 100%">
                        <el-table-column sortable prop="id" label="id" width="60">
                            <div slot-scope="scope">
                                <el-popover placement="bottom" title="" trigger="hover" :content="scope.row.address">
                                    <div>
                                        <span>{{scope.row.address}}</span>
                                        <el-button circle size="mini" @click="copy(scope.row.address)" slot="reference">复</el-button>
                                    </div>
                                    <el-button type="text" @click="open(scope.row.address)" slot="reference">{{scope.row.id}}</el-button>
                                </el-popover>
                            </div>
                        </el-table-column>
                        <el-table-column sortable prop="name" label="姓名" width="360">
                            <div slot-scope="scope">
                                <span>{{scope.row.name}}</span>
                                <span v-if="scope.row.img == 'yes'">
                                    <el-popover placement="bottom" title="" width="800" trigger="hover" :content="scope.row.address">
                                        <div >
                                            <img :src="scope.row.address + 'image.png'">
                                        </div>
                                        <el-button circle size="mini"  slot="reference">图</el-button>
                                    </el-popover>
                                </span>
                                
                                <el-popover v-if="scope.row.type == 'yes'" placement="bottom" title="" trigger="hover">
                                    <div>
                                        <table class="table table-hover">
                                            <thead>
                                                <tr>
                                                    <th scope="col">项</th>
                                                    <th scope="col">值</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                <template v-for="(item, index) in scope.row.info.authority">
                                                <tr>
                                                    <th>
                                                        {{index}}
                                                    </th>
                                                    <td>{{item}}</td>
                                                </tr>
                                                </template>
                                            </tbody>
                                        </table>
                                    </div>
                                    <el-button circle slot="reference" size="mini">说</el-button>
                                </el-popover>
                            </div>
                        </el-table-column>
                        <el-table-column :formatter="format">
                            <div slot-scope="scope">
                                <div v-if="scope.row.type == 'yes'">
                                    <el-tag v-for="item in scope.row.info.tags" :key="item">
                                        <el-button type="text" size="mini">{{item}}</el-button>
                                    </el-tag>
                                </div>
                                <div v-else-if="scope.row.type == 'no'">
                                </div>
                            </div>
                        </el-table-column >
                    </el-table>
                </el-tab-pane>
            </el-tabs>
        </div>
    </template>
    <!--######################### 初始化 #########################-->
    <template id='tConfig'>
        <div class="el-container">
            
        </div>
    </template>
